{% extends "base.html" %}

{% block title %}Job Details{% endblock %}

{% block content %}
<h2>{{ job.title }}</h2>

<p><strong>Description:</strong> {{ job.description }}</p>

<p>
<strong>Location:</strong>
{{ job.locality }}, {{ job.city }}
</p>

<p>
<strong>Landmark:</strong>
{{ job.landmark }}
</p>

<p>
<strong>Pincode:</strong>
{{ job.pincode }}
</p>

<hr>

<h4>Job Location Map</h4>

<iframe
width="100%"
height="350"
style="border:0"
src="https://www.google.com/maps?q={{ job.locality }},{{ job.city }}&output=embed">
</iframe>

{% endblock %}
