{% extends "base.html" %}

{% block title %}Post Job{% endblock %}

{% block content %}
<h2>Post a Job</h2>

<form method="POST">

    <input type="text" name="title" placeholder="Job Title" required>

    <textarea name="description" placeholder="Job Description" required></textarea>

    <input type="text" name="city" placeholder="City" required>

    <input type="text" name="pincode" placeholder="Pincode" required>

    <input type="number" name="wage" placeholder="Wage" required>

    <input type="text" name="work_type" placeholder="Enter Work Type (e.g., Welding, Carpentry)" required>

    <button type="submit">Post Job</button>

</form>

<a href="{{ url_for('auth.contractor_dashboard') }}">Back to Dashboard</a>
{% endblock %}
